name: Deploy to Staging

on:
  push:
    branches:
      - release/*
  workflow_dispatch:

env:
  FRONTEND_PATH: ${{ vars.STAGING_FRONTEND_PATH }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_PREFIX: landing-page-v2-staging

jobs:

  # ==========================================
  # JOB 1: Build Frontend
  # ==========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for staging
        run: npm run build:stag

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # ==========================================
  # JOB 2: Deploy Frontend via SSM
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend
    needs: build-frontend
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Debug GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package and upload to S3
        run: |
          tar -czf dist.tar.gz -C dist .
          aws s3 cp dist.tar.gz s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/frontend/dist.tar.gz

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.STAGING_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "echo \"Running as user: $(whoami)\"",
              "echo \"=== Deploying Frontend ===\"",
              "aws s3 cp s3://'"${{ env.S3_BUCKET }}"'/'"${{ env.S3_PREFIX }}"'/frontend/dist.tar.gz /tmp/dist.tar.gz",
              "rm -rf '"${{ env.FRONTEND_PATH }}"'/dist/*",
              "mkdir -p '"${{ env.FRONTEND_PATH }}"'/dist",
              "tar -xzf /tmp/dist.tar.gz -C '"${{ env.FRONTEND_PATH }}"'/dist/",
              "chown -R www-data:www-data '"${{ env.FRONTEND_PATH }}"'",
              "chmod -R 755 '"${{ env.FRONTEND_PATH }}"'",
              "rm -f /tmp/dist.tar.gz",
              "echo \"=== Frontend deployed successfully ===\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.STAGING_INSTANCE_ID }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.STAGING_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.STAGING_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.STAGING_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "SSM Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status: $STATUS"
            exit 1
          fi

  # ==========================================
  # JOB 3: Health Check
  # ==========================================
  health-check:
    name: Health Check
    needs: deploy-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_URL }})
          if [ "$response" != "200" ]; then
            echo "Frontend check failed with status: $response"
            exit 1
          fi
          echo "Frontend is accessible!"
