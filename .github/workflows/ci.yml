name: CI — Build & Test

on:
  pull_request:
    branches: [ "lovable-dev", "release/**", "main" ]
  push:
    branches: [ "lovable-dev", "release/**", "main" ]

jobs:
  build:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 1. Lint ───────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 2. Unit Tests (Vitest) ────────────────────────────────────────────
      # Produces:
      #   test-results/index.html  — HTML report for SDLC dashboard
      #   test-results/results.json — machine-readable counts
      - name: Run Unit Tests
        run: npm test

      - name: Parse unit test results
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            UNIT_TOTAL=$(jq '.numTotalTests  // 0' test-results/results.json)
            UNIT_PASSED=$(jq '.numPassedTests // 0' test-results/results.json)
            UNIT_FAILED=$(jq '.numFailedTests // 0' test-results/results.json)
          else
            UNIT_TOTAL=0; UNIT_PASSED=0; UNIT_FAILED=0
          fi
          echo "UNIT_TOTAL=$UNIT_TOTAL"   >> $GITHUB_ENV
          echo "UNIT_PASSED=$UNIT_PASSED" >> $GITHUB_ENV
          echo "UNIT_FAILED=$UNIT_FAILED" >> $GITHUB_ENV
          echo "Unit tests: $UNIT_PASSED/$UNIT_TOTAL passed"

      # ── 3. CVE Scan (npm audit) ───────────────────────────────────────────
      - name: Run CVE Scan
        if: always()
        run: |
          npm audit --json > npm-audit.json 2>/dev/null || true

          CVE_CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          CVE_HIGH=$(jq '.metadata.vulnerabilities.high     // 0' npm-audit.json)
          CVE_MEDIUM=$(jq '.metadata.vulnerabilities.moderate // 0' npm-audit.json)

          echo "CVE_CRITICAL=$CVE_CRITICAL" >> $GITHUB_ENV
          echo "CVE_HIGH=$CVE_HIGH"         >> $GITHUB_ENV
          echo "CVE_MEDIUM=$CVE_MEDIUM"     >> $GITHUB_ENV
          echo "CVE: critical=$CVE_CRITICAL high=$CVE_HIGH medium=$CVE_MEDIUM"

          # Generate HTML report from audit output
          echo "<html><body><h1>CVE Scan — npm audit</h1>" > cve-scan.html
          echo "<pre>$(cat npm-audit.json | jq '.metadata.vulnerabilities')</pre>" >> cve-scan.html
          echo "</body></html>" >> cve-scan.html

      # ── 4. Build Evidence Metrics JSON ────────────────────────────────────
      - name: Build Evidence Metrics
        if: always()
        run: |
          cat > sdlc-evidence.json <<EOF
          {
            "unit_tests": { "total": $UNIT_TOTAL, "passed": $UNIT_PASSED, "failed": $UNIT_FAILED },
            "security":   { "tool": "npm audit", "vulnerabilities": { "critical": $CVE_CRITICAL, "high": $CVE_HIGH, "medium": $CVE_MEDIUM } }
          }
          EOF
          echo "Generated sdlc-evidence.json:"
          cat sdlc-evidence.json

      # ── 5. Upload Artifacts ───────────────────────────────────────────────
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            sdlc-evidence.json
            test-results/
            cve-scan.html
          retention-days: 30

      # ── 6. Upload Evidence to SDLC State ─────────────────────────────────
      # Only runs on release/** — TESTING stage evidence
      - name: Upload Evidence to SDLC State
        if: always() && startsWith(github.ref, 'refs/heads/release/')
        env:
          SDLC_API_URL: ${{ vars.SDLC_API_URL }}
        run: |
          if [ -z "$SDLC_API_URL" ]; then
            echo "SDLC_API_URL not set — skipping evidence upload"
            exit 0
          fi

          VERSION="${GITHUB_REF#refs/heads/release/}"
          ORG="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "Uploading evidence for $ORG/$REPO @ $VERSION to $SDLC_API_URL..."

          PAYLOAD=$(jq -n \
            --arg org     "$ORG"     \
            --arg repo    "$REPO"    \
            --arg version "$VERSION" \
            --argjson metrics "$(cat sdlc-evidence.json)" \
            --rawfile unit_html  test-results/index.html \
            --rawfile cve_html   cve-scan.html           \
            '{
              org:      $org,
              repo:     $repo,
              version:  $version,
              pipeline: "CI — Build & Test",
              metrics:  $metrics,
              reports: {
                unit_tests: $unit_html,
                security:   $cve_html
              }
            }')

          HTTP_STATUS=$(curl -s -o /tmp/sdlc_response.json -w "%{http_code}" \
            -X POST "$SDLC_API_URL/api/evidence/upload" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")

          cat /tmp/sdlc_response.json 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "SDLC upload returned HTTP $HTTP_STATUS — non-blocking"
          else
            echo "Evidence uploaded. ID: $(jq -r '.evidenceId' /tmp/sdlc_response.json)"
          fi

  # ── Auto-Tag on Push ──────────────────────────────────────────────────────
  tag:
    name: Auto-Tag on Push
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and Push Tag
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          if [[ "$BRANCH_NAME" == "lovable-dev" ]]; then
            NEW_TAG="dev-${SHA_SHORT}"
          elif [[ "$BRANCH_NAME" == release/* ]]; then
            VERSION=${BRANCH_NAME#release/}
            NEW_TAG="${VERSION}-rc-${SHA_SHORT}"
          else
            echo "Branch not targeted for auto-tagging. Skipping."
            exit 0
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Pushed tag: $NEW_TAG"
